<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 PinSaver - Download Pinterest Boards as ZIP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe6f0 0%, #ffd9e8 50%, #ffe0ed 100%);
            font-family: 'Segoe UI', 'Quicksand', 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 70px;
            box-shadow: 0 30px 60px rgba(231, 103, 146, 0.25);
            overflow: hidden;
        }

        .header-section {
            background: linear-gradient(120deg, #ff98bb, #ff7aa8);
            padding: 35px 30px 25px;
            text-align: center;
        }

        .emoji-title {
            font-size: 3.5rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 2.2rem;
            color: white;
            font-weight: 800;
            text-shadow: 2px 2px 0 #c45a82;
        }

        .tagline {
            color: #fff0f5;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.25);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 50px;
        }

        .form-area {
            padding: 35px 30px 25px;
        }

        .input-wrapper {
            background: #fff5f9;
            border-radius: 60px;
            padding: 5px;
            border: 2px solid #ffbfd5;
            margin-bottom: 20px;
        }

        .pinterest-input {
            width: 100%;
            padding: 18px 25px;
            background: transparent;
            border: none;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            color: #4a2a38;
        }

        .examples {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            justify-content: center;
        }

        .example-badge {
            background: #ffeef4;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            color: #d46b94;
            cursor: pointer;
            transition: 0.2s;
        }

        .example-badge:hover {
            background: #ffc0db;
            color: #a13e64;
        }

        .download-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff8eb5, #ff6b9d);
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: inherit;
        }

        .download-btn:hover:not(:disabled) {
            transform: scale(0.98);
        }

        .download-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .status-container {
            margin: 0 30px 25px 30px;
            background: #fff0f5;
            border-radius: 40px;
            padding: 18px 22px;
            border-left: 6px solid #ff98bb;
        }

        .status-message {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #b84a72;
            font-weight: 500;
        }

        .loader {
            width: 26px;
            height: 26px;
            border: 3px solid #ffbfd5;
            border-top: 3px solid #e85f91;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            background: #fff5f9;
            padding: 18px;
            text-align: center;
            font-size: 0.75rem;
            color: #e7a1bd;
            border-top: 1px solid #ffdbe9;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header-section">
        <div class="emoji-title">📌💾✨</div>
        <h1>PinSaver</h1>
        <div class="tagline">paste any Pinterest board → get ALL images as ZIP 💕</div>
    </div>

    <div class="form-area">
        <div class="input-wrapper">
            <input type="text" id="pinterestUrl" class="pinterest-input" 
                   placeholder="https://www.pinterest.com/username/board-name/ ... or any pin URL">
        </div>
        
        <div class="examples">
            <span class="example-badge" data-url="https://www.pinterest.com/pinterest/official-ideas/">🎨 example board</span>
            <span class="example-badge" data-url="https://www.pinterest.com/pin/123456789/">📌 example pin</span>
        </div>

        <button id="downloadBtn" class="download-btn">
            💖🌸 DOWNLOAD ZIP 🌸💖
        </button>
    </div>

    <div class="status-container" id="statusContainer">
        <div class="status-message" id="statusMessage">
            💬 ready! paste a public Pinterest board link above
        </div>
    </div>

    <div class="footer">
        💗 100% free • extracts original quality images • works with public boards 💗
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    const urlInput = document.getElementById('pinterestUrl');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusMessageDiv = document.getElementById('statusMessage');
    
    const PROXIES = [
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?'
    ];
    
    function updateStatus(message, isLoading = false, isError = false, progress = null) {
        if (isLoading) {
            statusMessageDiv.innerHTML = `
                <div class="loader"></div>
                <span>${message}</span>
                ${progress ? `<div style="font-size:0.85rem; margin-top:8px;">${progress}</div>` : ''}
            `;
        } else {
            const icon = isError ? '💔' : '🌸';
            statusMessageDiv.innerHTML = `${icon} <span>${message}</span>`;
        }
    }
    
    async function fetchWithProxy(url) {
        for (let i = 0; i < PROXIES.length; i++) {
            try {
                const proxyUrl = PROXIES[i] + encodeURIComponent(url);
                const response = await fetch(proxyUrl, {
                    headers: { 'User-Agent': 'Mozilla/5.0' }
                });
                if (response.ok) {
                    return await response.text();
                }
            } catch (e) {
                continue;
            }
        }
        throw new Error('All proxies failed');
    }
    
    function extractImagesFromHTML(html) {
        const imageUrls = new Set();
        
        const imgRegex = /<img[^>]+src=["'](https?:\/\/i\.pinimg\.com\/[^"']+\.(jpg|png|jpeg|webp))["']/gi;
        let match;
        while ((match = imgRegex.exec(html)) !== null) {
            let imgUrl = match[1];
            imgUrl = imgUrl.replace(/\/\d+x\d+/, '/originals');
            imgUrl = imgUrl.replace(/\/\d+x\//, '/originals/');
            imageUrls.add(imgUrl);
        }
        
        return Array.from(imageUrls);
    }
    
    async function downloadImagesAsZip(imageUrls, boardName) {
        const JSZip = window.JSZip;
        if (!JSZip) {
            throw new Error('JSZip library not loaded');
        }
        
        const zip = new JSZip();
        let downloaded = 0;
        let failed = 0;
        
        updateStatus(`📸 downloading ${imageUrls.length} images...`, true, false, `0/${imageUrls.length}`);
        
        const concurrency = 5;
        const batches = [];
        for (let i = 0; i < imageUrls.length; i += concurrency) {
            batches.push(imageUrls.slice(i, i + concurrency));
        }
        
        for (let batchIndex = 0; batchIndex < batches.length; batchIndex++) {
            const batch = batches[batchIndex];
            const promises = batch.map(async (imgUrl, idx) => {
                try {
                    const response = await fetch(imgUrl, {
                        headers: { 'User-Agent': 'Mozilla/5.0' }
                    });
                    if (response.ok) {
                        const blob = await response.blob();
                        const ext = imgUrl.includes('.png') ? 'png' : 'jpg';
                        const filename = `image_${String(downloaded + failed + idx + 1).padStart(3, '0')}.${ext}`;
                        zip.file(filename, blob);
                        downloaded++;
                    } else {
                        failed++;
                    }
                } catch (e) {
                    failed++;
                }
                updateStatus(`💖 downloading images...`, true, false, `${downloaded + failed}/${imageUrls.length}`);
            });
            await Promise.all(promises);
        }
        
        updateStatus(`✨ zipping ${downloaded} images...`, true, false);
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        return { zipBlob, downloaded, failed };
    }
    
    async function processPinterestUrl(pinterestUrl) {
        let cleanUrl = pinterestUrl.trim();
        if (!cleanUrl.startsWith('http')) {
            cleanUrl = 'https://' + cleanUrl;
        }
        
        if (!cleanUrl.includes('pinterest.com') && !cleanUrl.includes('pin.it')) {
            throw new Error('Please enter a valid Pinterest URL 💕');
        }
        
        updateStatus(`🌸 loading Pinterest board...`, true, false);
        
        const html = await fetchWithProxy(cleanUrl);
        
        if (!html || html.length < 500) {
            throw new Error('Could not load the Pinterest page. Make sure the board is public!');
        }
        
        updateStatus(`🔍 finding all beautiful images...`, true, false);
        
        const imageUrls = extractImagesFromHTML(html);
        
        if (imageUrls.length === 0) {
            throw new Error('No images found 😢. Is this board public?');
        }
        
        const uniqueImages = [...new Set(imageUrls)];
        const maxImages = 200;
        const imagesToDownload = uniqueImages.slice(0, maxImages);
        
        updateStatus(`🎀 found ${uniqueImages.length} images!`, true, false);
        
        let boardName = 'pinterest_board';
        const boardMatch = cleanUrl.match(/pinterest\.com\/[^\/]+\/([^\/?]+)/);
        if (boardMatch) {
            boardName = boardMatch[1];
        }
        
        const { zipBlob, downloaded, failed } = await downloadImagesAsZip(imagesToDownload, boardName);
        
        if (downloaded === 0) {
            throw new Error('Could not download any images. Please try again!');
        }
        
        const downloadUrl = URL.createObjectURL(zipBlob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = `${boardName}_pinterest_images.zip`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(downloadUrl);
        
        updateStatus(`🎉 SUCCESS! Downloaded ${downloaded} images 🎉`, false, false);
        return true;
    }
    
    async function handleDownload() {
        const url = urlInput.value.trim();
        
        if (!url) {
            updateStatus('💕 Please enter a Pinterest board or pin URL first!', false, true);
            return;
        }
        
        downloadBtn.disabled = true;
        downloadBtn.innerHTML = '⏳🌸 PROCESSING... 🌸⏳';
        
        try {
            await processPinterestUrl(url);
        } catch (error) {
            updateStatus(`❌ ${error.message}`, false, true);
        } finally {
            downloadBtn.disabled = false;
            downloadBtn.innerHTML = '💖🌸 DOWNLOAD ZIP 🌸💖';
        }
    }
    
    downloadBtn.addEventListener('click', handleDownload);
    
    document.querySelectorAll('.example-badge').forEach(badge => {
        badge.addEventListener('click', () => {
            const exampleUrl = badge.getAttribute('data-url');
            urlInput.value = exampleUrl;
            updateStatus(`✨ example loaded! click download to try ✨`, false, false);
        });
    });
    
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            handleDownload();
        }
    });
    
    updateStatus('💖 ready! paste any public Pinterest board URL above 💖', false, false);
</script>

</body>
</html>
